<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Save the Date · Mauricio & Carolyn · January 9, 2027 · Oaxaca, México">
  <title>Save the Date · Mauricio & Carolyn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #080604;
      --amber: #D4782A;
      --cream: #EDE3C7;
      --dim:   rgba(212,120,42,.09);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom cursor (desktop) ── */
    #cur1, #cur2 {
      position: fixed; pointer-events: none; border-radius: 50%;
      z-index: 9999; transform: translate(-50%,-50%);
      will-change: left, top;
    }
    #cur1 { width: 7px; height: 7px; background: var(--amber); mix-blend-mode: screen; }
    #cur2 { width: 28px; height: 28px; border: 1px solid rgba(212,120,42,.38); z-index: 9998; }

    /* ── Ambient glow ── */
    #glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 45% at 50% 44%, rgba(212,120,42,.11) 0%, transparent 68%),
        radial-gradient(ellipse 100% 70% at 50% 100%, rgba(212,120,42,.04) 0%, transparent 55%);
    }

    /* ── Scanline texture ── */
    #scan {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.055) 2px, rgba(0,0,0,.055) 4px
      );
    }

    /* ── Corner frame ── */
    #frm { position: fixed; inset: 16px; border: 1px solid rgba(212,120,42,.14); pointer-events: none; z-index: 3; }
    #frm .c { position: absolute; width: 18px; height: 18px; border-color: var(--amber); border-style: solid; opacity: .45; }
    #frm .c.tl { top:-1px; left:-1px;   border-width: 2px 0 0 2px; }
    #frm .c.tr { top:-1px; right:-1px;  border-width: 2px 2px 0 0; }
    #frm .c.bl { bottom:-1px; left:-1px;  border-width: 0 0 2px 2px; }
    #frm .c.br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    /* ── Flower canvas (background) ── */
    #cv { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Page ── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: clamp(3rem,6vh,5rem) clamp(1.8rem,5vw,3.5rem);
      gap: 0;
      pointer-events: none; /* let flower canvas receive pointer events */
    }

    /* re-enable pointer on interactive children */
    .page > * { pointer-events: auto; }

    /* ── SAVE THE DATE ── */
    .lbl {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(.60rem,1.5vw,.80rem);
      letter-spacing: .46em;
      color: var(--amber);
      margin-bottom: clamp(.35rem,.7vh,.55rem);
      opacity: 0; animation: aDown .9s ease .3s forwards;
    }

    /* ── Wedding subtitle ── */
    .sub {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(.88rem,2.2vw,1.12rem);
      letter-spacing: .10em;
      color: rgba(237,227,199,.55);
      margin-bottom: clamp(.55rem,1.1vh,.9rem);
      opacity: 0; animation: aFade .9s ease .42s forwards;
    }

    /* ── Names ── */
    .nb { margin-bottom: clamp(.6rem,1.3vh,1.0rem); }

    .n1, .n2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-style: normal;                  /* BOTH upright — no italics */
      font-size: clamp(2.6rem,8vw,5.4rem);
      letter-spacing: .09em;
      color: var(--cream);
      line-height: 1.03; display: block;
      transition: letter-spacing .45s ease, opacity .45s ease;
    }
    .n1 { opacity: 0; animation: aLeft  .9s ease .5s forwards; }
    .n2 { opacity: 0; animation: aRight .9s ease .7s forwards; }
    .n1:hover, .n2:hover { letter-spacing: .15em; }

    .amp {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic; font-weight: 300;
      font-size: clamp(1.1rem,3.2vw,2rem);
      color: var(--amber); display: block; line-height: 1.6;
      opacity: 0; animation: aPop .7s ease .6s forwards;
    }

    /* ── Thin rule separator ── */
    .sep {
      display: flex; align-items: center; gap: .9rem;
      margin-bottom: clamp(.55rem,1.1vh,.9rem);
      opacity: 0; animation: aFade .9s ease .9s forwards;
    }
    .sl {
      width: clamp(40px,9vw,90px); height: 1px;
      background: linear-gradient(to right, transparent, rgba(212,120,42,.42), transparent);
    }
    .sc { display: flex; gap: 5px; align-items: center; }
    .sc span { display: inline-block; width: 3px; height: 3px; background: rgba(212,120,42,.68); transform: rotate(45deg); }

    /* ── Date ── */
    .dtxt {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(.80rem,2.1vw,1.08rem);
      letter-spacing: .33em; color: var(--cream);
      margin-bottom: clamp(.3rem,.65vh,.55rem);
      opacity: 0; animation: aFade .9s ease 1.0s forwards;
    }

    /* ── Location ── */
    .loc {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(1rem,2.4vw,1.20rem);
      letter-spacing: .15em; color: var(--amber);
      margin-bottom: clamp(.75rem,1.6vh,1.3rem);
      opacity: 0; animation: aFade .9s ease 1.1s forwards;
    }

    /* ── Countdown ── */
    .cd {
      margin-bottom: clamp(.75rem,1.6vh,1.3rem);
      opacity: 0; animation: aFade .9s ease 1.2s forwards;
    }
    .cdn {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(2rem,5vw,3.0rem);
      color: var(--cream); display: block; line-height: 1;
    }
    .cdl {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(.52rem,1.1vw,.65rem);
      letter-spacing: .42em; color: var(--amber); opacity: .80;
    }

    /* ── Invitation ── */
    .inv {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(.58rem,1.3vw,.72rem);
      letter-spacing: .42em; color: rgba(237,227,199,.6);
      margin-bottom: clamp(1rem,2.1vh,1.7rem);
      opacity: 0; animation: aFade .9s ease 1.3s forwards;
    }

    /* ── Calendar ── */
    .cw { opacity: 0; animation: aFade .9s ease 1.5s forwards; }

    .bsv {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(.60rem,1.35vw,.75rem);
      letter-spacing: .22em;
      background: transparent; color: var(--amber);
      border: 1px solid rgba(212,120,42,.48);
      padding: clamp(.85em,.9em,1em) clamp(1.8em,2.2em,2.6em);
      cursor: pointer; min-height: 44px;          /* touch-friendly */
      transition: all .28s ease;
    }
    .bsv:hover, .bsv:focus-visible {
      background: rgba(212,120,42,.11);
      border-color: var(--amber); color: var(--cream);
      outline: none;
    }

    .csub {
      display: none; margin-top: .8rem;
      gap: .5rem; justify-content: center; flex-wrap: wrap;
    }
    .csub.open { display: flex; }

    .bco {
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(.52rem,1.0vw,.63rem);
      letter-spacing: .16em; color: rgba(212,120,42,.72);
      background: transparent; border: 1px solid rgba(212,120,42,.25);
      padding: .7em 1.5em; cursor: pointer; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: all .28s;
    }
    .bco:hover, .bco:focus-visible {
      background: var(--dim); border-color: var(--amber); color: var(--amber);
      outline: none;
    }

    /* ── Animations ── */
    @keyframes aDown  { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes aFade  { from{opacity:0}                             to{opacity:1} }
    @keyframes aLeft  { from{opacity:0;transform:translateX(-22px)} to{opacity:1;transform:translateX(0)} }
    @keyframes aRight { from{opacity:0;transform:translateX( 22px)} to{opacity:1;transform:translateX(0)} }
    @keyframes aPop   { from{opacity:0;transform:scale(.4)}         to{opacity:1;transform:scale(1)} }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { cursor: auto; }
      #cur1, #cur2 { display: none; }
      #frm { inset: 10px; }
      .bsv { width: 100%; max-width: 290px; }
    }
  </style>
</head>
<body>

<div id="cur1"></div>
<div id="cur2"></div>
<div id="glow"></div>
<div id="scan"></div>
<div id="frm">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>
</div>

<canvas id="cv"></canvas>

<div class="page">
  <div class="lbl">— SAVE THE DATE —</div>
  <div class="sub">to celebrate the wedding of</div>

  <div class="nb">
    <span class="n1">Mauricio</span>
    <span class="amp">&amp;</span>
    <span class="n2">Carolyn</span>
  </div>

  <div class="sep">
    <div class="sl"></div>
    <div class="sc"><span></span><span></span><span></span></div>
    <div class="sl"></div>
  </div>

  <div class="dtxt">09 &middot; JANUARY &middot; 2027</div>
  <div class="loc">Oaxaca, México</div>

  <div class="cd">
    <span class="cdn" id="cnt">—</span>
    <span class="cdl">DAYS AWAY</span>
  </div>

  <div class="inv">INVITATION TO FOLLOW</div>

  <div class="cw">
    <button class="bsv" onclick="toggleCal()" aria-expanded="false" id="calBtn">ADD TO CALENDAR</button>
    <div class="csub" id="csub" role="group" aria-label="Calendar options">
      <button class="bco" onclick="dlICS()">Apple Calendar</button>
      <button class="bco" onclick="openGCal()">Google Calendar</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   CUSTOM CURSOR
══════════════════════════════════════════ */
const $c1 = document.getElementById('cur1');
const $c2 = document.getElementById('cur2');
let mx = innerWidth/2, my = innerHeight/2, lx = mx, ly = my;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

(function curLoop() {
  $c1.style.left = mx + 'px';  $c1.style.top = my + 'px';
  lx += (mx - lx) * .13;       ly += (my - ly) * .13;
  $c2.style.left = lx + 'px';  $c2.style.top  = ly + 'px';
  requestAnimationFrame(curLoop);
})();

/* ══════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════ */
(function() {
  const target = new Date('2027-01-09T12:00:00');
  const diff   = Math.ceil((target - Date.now()) / 86400000);
  const el     = document.getElementById('cnt');
  if (diff <= 0) { el.textContent = 'Today!'; return; }
  let n = Math.max(0, diff - 30);
  const tick = () => {
    el.textContent = n.toLocaleString('en');
    if (n < diff) { n++; setTimeout(tick, 24); }
  };
  setTimeout(tick, 1200);
})();

/* ══════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════ */
function toggleCal() {
  const sub = document.getElementById('csub');
  const btn = document.getElementById('calBtn');
  const open = sub.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
}

function dlICS() {
  const s = [
    'BEGIN:VCALENDAR','VERSION:2.0',
    'PRODID:-//Mauricio & Carolyn//Save the Date//EN',
    'BEGIN:VEVENT',
    'DTSTART;VALUE=DATE:20270109',
    'DTEND;VALUE=DATE:20270110',
    'SUMMARY:Mauricio & Carolyn — Save the Date',
    'DESCRIPTION:Invitation to follow · Oaxaca\\, México',
    'LOCATION:Oaxaca\\, México',
    'STATUS:CONFIRMED',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const b = new Blob([s], { type: 'text/calendar;charset=utf-8' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = u; a.download = 'mauricio-carolyn-save-the-date.ics';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(u), 1000);
}

function openGCal() {
  window.open(
    'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text=Mauricio+%26+Carolyn+%E2%80%94+Save+the+Date'
    + '&dates=20270109/20270110'
    + '&details=Invitation+to+follow.+Oaxaca%2C+M%C3%A9xico'
    + '&location=Oaxaca%2C+M%C3%A9xico',
    '_blank'
  );
}

/* ══════════════════════════════════════════
   FLOATING CEMPASÚCHIL FLOWERS
   Physics: drift · repulsion · boundary spring
══════════════════════════════════════════ */
(function() {
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const AMBER = '#D4782A';

  /* ── canvas resize ── */
  function resize() { cv.width = innerWidth; cv.height = innerHeight; }
  window.addEventListener('resize', resize); resize();

  /* ── Draw one cempasúchil petal (teardrop bezier, pointing up) ── */
  function drawPetal(ctx, iR, oR, hw) {
    const m  = iR + (oR - iR) * .42;
    const m2 = iR + (oR - iR) * .78;
    ctx.beginPath();
    ctx.moveTo(0, -iR);
    ctx.bezierCurveTo( hw*.9, -(iR+(m-iR)*.3),  hw*1.15, -m,  hw*.55, -m2);
    ctx.bezierCurveTo( hw*.2, -(oR-1),          -hw*.2,  -(oR-1), -hw*.55, -m2);
    ctx.bezierCurveTo(-hw*1.15, -m, -hw*.9, -(iR+(m-iR)*.3), 0, -iR);
    ctx.closePath();
  }

  /* ── Draw full cempasúchil flower at origin ── */
  const RINGS = [
    { n:8,  iR:.07, oR:.26, hw:.055 },
    { n:13, iR:.22, oR:.50, hw:.080 },
    { n:18, iR:.45, oR:.76, hw:.095 },
    { n:22, iR:.70, oR:.98, hw:.106 },
  ];

  function drawFlower(x, y, size, rotation, ringOffsets, opacity) {
    ctx.save();
    ctx.translate(x, y);
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = AMBER;
    ctx.lineWidth   = 0.9;
    ctx.lineJoin    = 'round';

    RINGS.forEach((r, ri) => {
      const iR = r.iR * size, oR = r.oR * size, hw = r.hw * size;
      const rOff = ringOffsets[ri] || 0;
      for (let i = 0; i < r.n; i++) {
        ctx.save();
        ctx.rotate(rotation + rOff + (Math.PI * 2 / r.n) * i);
        drawPetal(ctx, iR, oR, hw);
        ctx.stroke();
        ctx.restore();
      }
    });

    // centre dot
    ctx.beginPath();
    ctx.arc(0, 0, size * .038, 0, Math.PI*2);
    ctx.fillStyle = '#EDE3C7';
    ctx.globalAlpha = opacity * .9;
    ctx.fill();

    ctx.restore();
  }

  /* ── Flower particle class ── */
  class Flower {
    constructor() { this.spawn(true); }

    spawn(scatter) {
      // Start scattered across screen or from a random edge
      if (scatter) {
        this.x  = Math.random() * innerWidth;
        this.y  = Math.random() * innerHeight;
      } else {
        const edge = Math.floor(Math.random() * 4);
        if (edge === 0) { this.x = -80; this.y = Math.random() * innerHeight; }
        else if (edge===1) { this.x = innerWidth+80; this.y = Math.random()*innerHeight; }
        else if (edge===2) { this.x = Math.random()*innerWidth; this.y = -80; }
        else               { this.x = Math.random()*innerWidth; this.y = innerHeight+80; }
      }

      this.size    = Math.random() * 42 + 22;          // 22–64 px
      this.opacity = Math.random() * .28 + .10;         // 0.10–0.38
      this.vx      = (Math.random() - .5) * .5;
      this.vy      = (Math.random() - .5) * .5;
      this.rotation = Math.random() * Math.PI * 2;
      this.spin    = (Math.random() - .5) * .006;       // overall spin
      // Per-ring rotation offsets & individual spin rates
      this.ringOff   = RINGS.map(() => Math.random() * Math.PI * 2);
      this.ringSpeed = [.018, -.012, .008, -.005].map(s => s * (Math.random()*.6+.7));
    }

    update(pointerX, pointerY) {
      // Repulsion from pointer
      const dx   = this.x - pointerX;
      const dy   = this.y - pointerY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const REP  = this.size * 4.5;   // repulsion radius scales with flower size

      if (dist < REP && dist > 0) {
        const force = (1 - dist/REP) * 3.8;
        this.vx += (dx/dist) * force;
        this.vy += (dy/dist) * force;
      }

      // Gentle random wander
      this.vx += (Math.random() - .5) * .04;
      this.vy += (Math.random() - .5) * .04;

      // Soft boundary spring — push back gently
      const PAD = 60;
      if (this.x < PAD)              this.vx += (PAD - this.x) * .018;
      if (this.x > cv.width - PAD)   this.vx -= (this.x - cv.width + PAD) * .018;
      if (this.y < PAD)              this.vy += (PAD - this.y) * .018;
      if (this.y > cv.height - PAD)  this.vy -= (this.y - cv.height + PAD) * .018;

      // Friction
      this.vx *= .96;
      this.vy *= .96;

      // Speed cap
      const spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
      if (spd > 6) { this.vx = (this.vx/spd)*6; this.vy = (this.vy/spd)*6; }

      this.x += this.vx;
      this.y += this.vy;

      // Spin
      this.rotation += this.spin;
      this.ringOff = this.ringOff.map((r, i) => r + this.ringSpeed[i]);
    }

    draw() {
      drawFlower(this.x, this.y, this.size, this.rotation, this.ringOff, this.opacity);
    }
  }

  /* ── Create flowers ── */
  const FLOWER_COUNT = 11;
  const flowers = Array.from({ length: FLOWER_COUNT }, () => new Flower());

  /* ── Pointer tracking (mouse + touch) ── */
  let px = -999, py = -999;

  document.addEventListener('mousemove', e => { px = e.clientX; py = e.clientY; });
  document.addEventListener('mouseleave', () => { px = -999; py = -999; });

  // Touch: use first touch point
  document.addEventListener('touchstart', e => {
    px = e.touches[0].clientX;
    py = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    px = e.touches[0].clientX;
    py = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', () => {
    // Keep last position briefly then fade out
    setTimeout(() => { px = -999; py = -999; }, 400);
  }, { passive: true });

  /* ── Animation loop ── */
  (function loop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    flowers.forEach(f => { f.update(px, py); f.draw(); });
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
